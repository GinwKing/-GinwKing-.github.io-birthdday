<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>
<style>
@import url(https://fonts.googleapis.com/css?family=Lato:300italic);

.avatar {
  text-align: center;
  margin-top: 15px;
}
.avatar img {
  width: 190px;
  height: 190px;
  border-radius: 50%;
  border: 6px solid white;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
  object-fit: cover;
}

body {
  width: 100%;
  height: 100%;
  background: #ee9ca7;
}

#cake {
  display: block;
  position: relative;
  margin: -10em auto 0 auto;
}

/* ✅ 修复后的蜡烛 */
.velas {
  background: #ffffff;
  border-radius: 10px;
  position: absolute;

  /* 👇 调整到蛋糕顶部 */
  top: 120px;
  left: 50%;
  margin-left: -2.5px;

  width: 5px;
  height: 35px;

  /* ❌ 去掉漂浮 */
  transform: none;

  backface-visibility: hidden;

  /* 👇 改成自然出现 */
  opacity: 0;
  animation: candleIn 0.8s 6s ease-out forwards;
}

.velas:after,
.velas:before {
  background: rgba(255, 0, 0, 0.4);
  content: "";
  position: absolute;
  width: 100%;
  height: 2px;
}
.velas:after {
  top: 25%;
}
.velas:before {
  top: 45%;
}

/* 火焰 */
.fuego {
  border-radius: 100%;
  position: absolute;
  top: -20px;
  left: 50%;
  margin-left: -2.6px;
  width: 6.6px;
  height: 18px;
}

.fuego:nth-child(1) { animation: fuego 2s 6.5s infinite; }
.fuego:nth-child(2) { animation: fuego 1.5s 6.5s infinite; }
.fuego:nth-child(3) { animation: fuego 1s 6.5s infinite; }
.fuego:nth-child(4) { animation: fuego 0.5s 6.5s infinite; }
.fuego:nth-child(5) { animation: fuego 0.2s 6.5s infinite; }

/* 火焰动画 */
@keyframes fuego {
  0%, 100% {
    background: rgba(254, 248, 97, 0.5);
    box-shadow: 0 0 40px 10px rgba(248, 233, 209, 0.2);
    transform: translateY(0) scale(1);
  }
  50% {
    background: rgba(255, 50, 0, 0.1);
    box-shadow: 0 0 40px 20px rgba(248, 233, 209, 0.2);
    transform: translateY(-20px) scale(0);
  }
}

/* ✅ 新增：蜡烛出现动画 */
@keyframes candleIn {
  to {
    opacity: 1;
  }
}

.text {
  color: #8b6a60;
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-style: italic;
  text-align: center;
}
.text h1 {
  font-size: 1.4em;
}
</style>
</head>

<body>

<div class="velas">
  <div class="fuego"></div>
  <div class="fuego"></div>
  <div class="fuego"></div>
  <div class="fuego"></div>
  <div class="fuego"></div>
</div>

<!-- 原蛋糕 SVG 保持不变 -->
<!-- ⚠️ 这里省略 SVG（你原文件直接保留即可） -->
<!-- 你可以直接复制你原来的 SVG 放这里 -->

<div class="text">
  <h1>happy birthday!</h1>
  <p>Poly</p>
</div>

<div class="avatar">
  <img src="tx.jpg" alt="头像">
</div>

<div class="tip">（点击页面以开启音乐）</div>
<img src="yiyong.jpg" width="300" alt="一张纪念图片">

<audio id="bgm" src="off-the-hook.mp3" autoplay hidden muted></audio>

<script>
document.addEventListener('click', function () {
  const audio = document.getElementById('bgm');
  audio.muted = false;
  audio.play();
}, { once: true });
</script>

</body>
</html>
